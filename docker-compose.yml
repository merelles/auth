services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-service:local
    environment:
      AUTH_SERVER_HOST: 0.0.0.0
      AUTH_SERVER_PORT: 9090
      AUTH_STORAGE_DIALECT: ${AUTH_STORAGE_DIALECT:-memory}
      AUTH_DATABASE_HOST: ${AUTH_DATABASE_HOST:-postgres}
      AUTH_DATABASE_PORT: ${AUTH_DATABASE_PORT:-5432}
      AUTH_DATABASE_NAME: ${AUTH_DATABASE_NAME:-auth}
      AUTH_DATABASE_USER: ${AUTH_DATABASE_USER:-auth}
      AUTH_DATABASE_PASSWORD: ${AUTH_DATABASE_PASSWORD:-change_me}
      AUTH_MONGODB_URI: ${AUTH_MONGODB_URI:-mongodb://mongodb:27017}
      AUTH_MONGODB_DATABASE: ${AUTH_MONGODB_DATABASE:-auth}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "9090:9090"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
